<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <section class="card__result">
      <h1 class="card__result-title">Your Result</h1>

      <div class="card__result-score-container">
        <h2 class="card__result-score">76</h2>
        <span class="card__result-score-total">of 100</span>
      </div>

      <h3 class="card__result-message">Great</h3>

      <p class="card__result-stats">
        You scored higher than 65% of the people who have taken these tests.
      </p>
    </section>
      
    <section class="card__summary">
      <h2 class="card__summary-title">Summary</h2>

      <div class="card__summary-stats-container">
        <div class="card__summary-stats">
          <img class="card__summary-stats-icon" src="images/icon-reaction.svg" alt="Lighting icon">
          <p class="card__summary-stats-label">Reaction</p>
          <p class="card__summary-stats-score">80 / 100</p>
        </div>

        <div class="card__summary-stats">
          <img class="card__summary-stats-icon" src="images/icon-memory.svg" alt="Lighting icon">
          <p class="card__summary-stats-label">Memory</p>
          <p class="card__summary-stats-score">92 / 100</p>
        </div>

        <div class="card__summary-stats">
          <img class="card__summary-stats-icon" src="images/icon-verbal.svg" alt="Lighting icon">
          <p class="card__summary-stats-label">Verbal</p>
          <p class="card__summary-stats-score">61 / 100</p>
        </div>

        <div class="card__summary-stats">
          <img class="card__summary-stats-icon" src="images/icon-visual.svg" alt="Lighting icon">
          <p class="card__summary-stats-label">Visual</p>
          <p class="card__summary-stats-score">72 / 100</p>
        </div>
      </div>

      <button class="card__summary-cta">Continue</button>
    </section>
  </main>
</body>
</html>
